<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <title>
      Frontend Mentor | Newsletter sign-up form with success message
    </title>
  </head>
  <body>
    <main>
      <section
        class="newsletter"
        aria-labelledby="newsletter-title"
        aria-describedby="newsletter-description"
      >
        <div class="newsletter__content">
          <header class="newsletter__header">
            <h1 class="newsletter__title" id="newsletter-title">
              Stay updated!
            </h1>
            <p class="newsletter__description" id="newsletter-description">
              Join 60,000+ product managers receiving monthly updates on:
            </p>
            <ul class="newsletter__list">
              <li class="newsletter__item">
                Product discovery and building what matters
              </li>
              <li class="newsletter__item">
                Measuring to ensure updates are a success
              </li>
              <li class="newsletter__item">And much more!</li>
            </ul>
          </header>
          <form
            class="newsletter-form"
            aria-labelledby="newsletter-title"
            novalidate
          >
            <fieldset class="newsletter-form__field">
              <div class="newsletter-form__field-group">
                <label class="newsletter-form__label" for="email"
                  >Email address</label
                >
                <span
                  class="newsletter-form__error"
                  id="email-error"
                  aria-live="polite"
                ></span>
              </div>
              <input
                class="newsletter-form__input"
                id="email"
                name="email"
                type="email"
                autocomplete="email"
                placeholder="email@company.com"
                aria-describedby="email-error"
                required
              />
            </fieldset>
            <button class="newsletter-form__button" type="submit">
              Subscribe to monthly newsletter
            </button>
          </form>
        </div>
        <div class="newsletter__image-wrapper">
          <picture>
            <source
              media="(min-width: 1024px)"
              srcset="./assets/images/illustration-sign-up-desktop.svg"
            />
            <source
              media="(min-width: 768px)"
              srcset="./assets/images/illustration-sign-up-tablet.svg"
            />
            <img
              src="./assets/images/illustration-sign-up-mobile.svg"
              alt="Illustration showing newsletter statistics"
            />
          </picture>
        </div>
      </section>
    </main>
  </body>
</html>
